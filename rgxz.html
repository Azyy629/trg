<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>极域课堂管理软件阻止工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 1.5rem;
        }

        /* 密码解锁面板 - 初始可见 */
        .lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 10%, #0a0f1c, #03060c);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0.4s;
            opacity: 1;
            visibility: visible;
        }

        .lock-card {
            background: rgba(20, 28, 40, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            width: 90%;
            max-width: 440px;
            padding: 2.2rem 1.8rem 2.4rem;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(71, 85, 105, 0.3);
            text-align: center;
            border: 1px solid rgba(255,255,240,0.15);
            transition: transform 0.2s;
        }

        .lock-icon {
            font-size: 3.8rem;
            filter: drop-shadow(0 4px 6px #00000040);
            margin-bottom: 0.75rem;
        }

        .lock-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #e2e8f0, #b9c8ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .lock-sub {
            color: #9ab3d5;
            font-size: 0.85rem;
            margin-bottom: 1.8rem;
            border-bottom: 1px dashed #2d3a5e;
            display: inline-block;
            padding-bottom: 6px;
        }

        .password-box {
            background: #0f1422;
            border: 1px solid #2d3e6e;
            border-radius: 60px;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 1rem 0 1.2rem;
            transition: all 0.2s;
        }

        .password-box:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
        }

        #passwordInput {
            background: transparent;
            border: none;
            padding: 0.9rem 0;
            font-size: 1rem;
            color: #f0f3fa;
            width: 70%;
            outline: none;
            font-family: monospace;
            letter-spacing: 1px;
        }

        #passwordInput::placeholder {
            color: #4b5e85;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .unlock-btn {
            background: #2563eb;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-left: 6px;
        }

        .unlock-btn:hover {
            background: #3b82f6;
            transform: scale(0.97);
        }

        .error-msg {
            font-size: 0.75rem;
            background: #7f1a1a40;
            padding: 0.4rem;
            border-radius: 40px;
            color: #fca5a5;
            min-height: 2rem;
            margin-top: 0.2rem;
        }

        /* 主内容区 - 初始隐藏 */
        .main-content {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0s 0.5s;
            width: 100%;
            max-width: 680px;
        }

        .main-content.visible {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.5s ease, visibility 0s 0s;
        }

        /* 原卡片样式 */
        .card {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 56px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 4px 12px rgba(0, 0, 0, 0.1);
            padding: 2.8rem 2.2rem 3.2rem;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 32px 48px -16px rgba(0, 0, 0, 0.4);
        }

        .main-title {
            font-size: 5.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #1E2A3E, #2C3E66);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.05);
            margin-bottom: 0.5rem;
        }

        .title-underline {
            width: 80px;
            height: 4px;
            background: #3b82f6;
            border-radius: 4px;
            margin: 0.8rem auto 1.5rem auto;
            opacity: 0.7;
        }

        .info-text {
            color: #2c3e50;
            font-size: 1rem;
            background: #f0f4fa;
            padding: 0.8rem 1rem;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2.4rem;
        }

        .download-btn {
            background: #0f172a;
            border: none;
            color: white;
            font-size: 1.25rem;
            font-weight: 600;
            padding: 1rem 2.4rem;
            border-radius: 60px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.25s ease;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255,255,255,0.2);
            background: linear-gradient(105deg, #1e293b, #0f172a);
        }

        .download-btn:hover {
            background: linear-gradient(105deg, #2d3a5e, #0f172a);
            transform: scale(1.02);
            box-shadow: 0 14px 26px -8px rgba(0, 0, 0, 0.3);
        }

        .download-btn:active {
            transform: scale(0.97);
        }

        .btn-icon {
            font-size: 1.5rem;
        }

        .feedback-msg {
            margin-top: 1.8rem;
            font-size: 0.85rem;
            padding: 0.5rem;
            border-radius: 40px;
            background: #eef2ff;
            color: #1e293b;
            transition: all 0.2s;
            display: inline-block;
            width: auto;
            min-width: 200px;
        }

        .footnote {
            margin-top: 2.2rem;
            font-size: 0.7rem;
            color: #5b6e8c;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.4rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        @media (max-width: 550px) {
            .card {
                padding: 2rem 1.2rem 2.2rem;
            }
            .main-title {
                font-size: 3.8rem;
            }
            .download-btn {
                font-size: 1rem;
                padding: 0.8rem 1.8rem;
            }
            .lock-card {
                padding: 1.8rem 1.2rem;
            }
        }
    </style>
</head>
<body>

<!-- 密码解锁层 -->
<div class="lock-screen" id="lockScreen">
    <div class="lock-card">
        <div class="lock-icon">🔐</div>
        <div class="lock-title">验证访问</div>
        <div class="lock-sub">机器人验证</div>
        <div class="password-box">
            <input type="password" id="passwordInput" placeholder="请输入fuckyoumum" autocomplete="off" autofocus>
            <button class="unlock-btn" id="unlockBtn">解锁 ▶</button>
        </div>
        <div id="lockErrorMsg" class="error-msg"></div>
        <div style="font-size:0.65rem; margin-top: 1rem; color:#4a5b7e;">🔒 仅人可访问工具页面</div>
    </div>
</div>

<!-- 主内容区：tools + 下载按钮（受密码保护） -->
<div class="main-content" id="mainContent">
    <div class="card">
        <div class="main-title">tools</div>
        <div class="title-underline"></div>

        <div class="info-text">
            <span class="info-icon">⚙️</span>
            <span>谁不下载谁是gay</span>
        </div>

        <button class="download-btn" id="downloadBtn">
            <span class="btn-icon">⬇️</span>
            <span>立即下载</span>
        </button>

        <div id="downloadFeedback" class="feedback-msg">
            点击按钮开始下载
        </div>

    </div>
</div>

<script>
    (function() {
        // ---------- 密码配置 ----------
        const CORRECT_PASSWORD = "fuckyoumum";   // 预设密码
        
        // DOM 元素
        const lockScreen = document.getElementById('lockScreen');
        const mainContent = document.getElementById('mainContent');
        const passwordInput = document.getElementById('passwordInput');
        const unlockBtn = document.getElementById('unlockBtn');
        const lockErrorMsg = document.getElementById('lockErrorMsg');
        
        // 下载相关元素
        const downloadBtn = document.getElementById('downloadBtn');
        const feedbackDiv = document.getElementById('downloadFeedback');
        const DOWNLOAD_URL = "https://gitee.com/trg27569/rgxz/raw/master/%E6%9E%81%E5%9F%9F%E8%BF%9B%E7%A8%8B%E6%8E%A7%E5%88%B6%E5%99%A8.exe";
        
        // ---------- 密码验证逻辑 ----------
        function unlockApp() {
            const enteredPassword = passwordInput.value;
            if (enteredPassword === CORRECT_PASSWORD) {
                // 密码正确: 隐藏遮罩层，显示主内容
                lockScreen.style.opacity = '0';
                lockScreen.style.visibility = 'hidden';
                setTimeout(() => {
                    lockScreen.style.display = 'none';
                }, 400);
                mainContent.classList.add('visible');
                lockErrorMsg.textContent = '';
                passwordInput.value = '';
            } else {
                lockErrorMsg.textContent = '❌ 密码错误，gay你好';
                passwordInput.value = '';
                passwordInput.focus();
                const lockCard = document.querySelector('.lock-card');
                if (lockCard) {
                    lockCard.style.transform = 'scale(0.99)';
                    setTimeout(() => { if(lockCard) lockCard.style.transform = ''; }, 150);
                }
            }
        }
        
        function onPasswordKeyPress(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                unlockApp();
            }
        }
        
        if (unlockBtn) {
            unlockBtn.addEventListener('click', unlockApp);
        }
        if (passwordInput) {
            passwordInput.addEventListener('keypress', onPasswordKeyPress);
            setTimeout(() => passwordInput.focus(), 100);
        }
        
        // ---------- 下载逻辑（无任何额外提示/复制按钮）----------
        function setFeedback(message, isError = false) {
            if (!feedbackDiv) return;
            feedbackDiv.textContent = message;
            if (isError) {
                feedbackDiv.style.background = "#fee2e2";
                feedbackDiv.style.color = "#b91c1c";
            } else {
                feedbackDiv.style.background = "#eef2ff";
                feedbackDiv.style.color = "#1e293b";
            }
        }
        
        function performDownload() {
            setFeedback(" ");
            const link = document.createElement('a');
            link.href = DOWNLOAD_URL;
            link.download = 'rgxz.exe';
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // 简单延时恢复提示
            setTimeout(() => {
                if (feedbackDiv.textContent === " ") {
                    setFeedback(" ");
                }
            }, 1500);
        }
        
        let isDownloadingFlag = false;
        function handleDownloadClick() {
            if (isDownloadingFlag) {
                setFeedback(" ");
                return;
            }
            isDownloadingFlag = true;
            performDownload();
            setTimeout(() => {
                isDownloadingFlag = false;
            }, 1500);
        }
        
        // 解锁成功后初始化下载事件
        function initDownloadEvent() {
            if (downloadBtn) {
                downloadBtn.removeEventListener('click', handleDownloadClick);
                downloadBtn.addEventListener('click', handleDownloadClick);
            }
            setFeedback(" ");
        }
        
        // 监听主内容可见后初始化
        let initialized = false;
        function safeInit() {
            if (!initialized && mainContent.classList.contains('visible')) {
                initialized = true;
                initDownloadEvent();
            }
        }
        
        // 重写解锁调用确保初始化
        const originalUnlock = unlockApp;
        window.originalUnlock = originalUnlock;
        
        if (unlockBtn) {
            const newUnlockBtn = unlockBtn.cloneNode(true);
            unlockBtn.parentNode.replaceChild(newUnlockBtn, unlockBtn);
            newUnlockBtn.addEventListener('click', () => {
                const pwdVal = passwordInput.value;
                if (pwdVal === CORRECT_PASSWORD) {
                    originalUnlock();
                    setTimeout(() => {
                        if (mainContent.classList.contains('visible') && !initialized) {
                            safeInit();
                        }
                    }, 200);
                } else {
                    lockErrorMsg.textContent = '❌ 密码错误，gay你好';
                    passwordInput.value = '';
                    passwordInput.focus();
                    const lockCard = document.querySelector('.lock-card');
                    if (lockCard) {
                        lockCard.style.transform = 'scale(0.99)';
                        setTimeout(() => { if(lockCard) lockCard.style.transform = ''; }, 150);
                    }
                }
            });
            
            passwordInput.removeEventListener('keypress', onPasswordKeyPress);
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const pwdVal = passwordInput.value;
                    if (pwdVal === CORRECT_PASSWORD) {
                        originalUnlock();
                        setTimeout(() => {
                            if (mainContent.classList.contains('visible') && !initialized) safeInit();
                        }, 200);
                    } else {
                        lockErrorMsg.textContent = '❌ 密码错误，拒绝访问';
                        passwordInput.value = '';
                        passwordInput.focus();
                    }
                }
            });
        }
        
        const observer = new MutationObserver((mutations) => {
            if (mainContent.classList.contains('visible') && !initialized) {
                safeInit();
                observer.disconnect();
            }
        });
        observer.observe(mainContent, { attributes: true, attributeFilter: ['class'] });
        
        lockScreen.style.display = 'flex';
        mainContent.classList.remove('visible');
        setFeedback("请先通过机器人验证");
    })();
</script>
</body>
</html>
