<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="3; url=https://trg27569.42web.io/">
    <title>网站迁移通知</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        .icon {
            font-size: 56px;
            margin-bottom: 10px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .new-url {
            color: #007bff;
            font-weight: bold;
            word-break: break-all;
        }
        .timer {
            margin: 20px 0 10px;
            font-size: 14px;
            color: #888;
        }
        .manual-link {
            display: inline-block;
            margin-top: 5px;
            padding: 10px 28px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .manual-link:hover {
            background: #0056b3;
        }
        .note {
            margin-top: 20px;
            font-size: 13px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚚</div>
        <h1>网站已迁移</h1>
        <p style="color: #555; margin: 5px 0 15px;">
            本站已迁移至新地址：<br>
            <span class="new-url">https://trg27569.42web.io/</span>
        </p>
        <div class="timer">⏳ 页面将在 <span id="countdown">3</span> 秒后自动跳转...</div>
        <br>
        <a href="https://trg27569.42web.io/" class="manual-link">立即前往新站</a>
        <p class="note">若未自动跳转，请点击上方按钮</p>
    </div>

    <script>
        // 倒计时逻辑
        let seconds = 3;
        const countdownEl = document.getElementById('countdown');
        const timer = setInterval(() => {
            seconds -= 1;
            if (seconds > 0) {
                countdownEl.textContent = seconds;
            } else {
                clearInterval(timer);
                // 手动跳转（作为 meta refresh 的备份）
                window.location.href = 'https://trg27569.42web.io/';
            }
        }, 1000);
    </script>
</body>
</html>
